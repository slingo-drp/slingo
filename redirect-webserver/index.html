<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Slingo</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0b1220;
        color: #e5e7eb;
      }

      .card {
        width: min(340px, 90vw);
        background: #111827;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
      }

      .title {
        font-size: 18px;
        margin-bottom: 8px;
      }

      .status {
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 16px;
        min-height: 18px;
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 15px;
        cursor: pointer;
        background: #3b82f6;
        color: white;
      }

      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="title">Slingo</div>
      <div class="status" id="status">Launching…</div>

      <button id="open">Open in app</button>

      <div class="hint">If nothing happens, click the button</div>
    </div>

    <script>
      // ---- FIX 1: robust ID parsing for /~ae924/4 ----
      const parts = window.location.pathname.split("/").filter(Boolean);
      const id = parts[parts.length - 1];

      const deepLink = `slingo://${id}`;

      const statusEl = document.getElementById("status");
      const button = document.getElementById("open");

      let attempted = false;

      function openApp() {
        attempted = true;
        statusEl.textContent = "Opening app…";

        window.location.href = deepLink;

        // after attempt, show fallback message
        setTimeout(() => {
          statusEl.textContent = "Tap the button to open manually";
        }, 1500);
      }

      button.onclick = openApp;

      // auto attempt on load
      window.onload = () => {
        openApp();
      };
    </script>
  </body>
</html>
